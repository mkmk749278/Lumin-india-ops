name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          OPS_SESSION_SECRET: test-secret
          OPS_AUTH_TOKEN: test-token
        run: pytest -q

      - name: Lint (ruff)
        run: |
          pip install ruff
          ruff check app/
