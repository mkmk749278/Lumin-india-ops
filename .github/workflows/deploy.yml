name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - "*.md"
      - "CLAUDE.md"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy India Ops
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          request_pty: true
          command_timeout: 12m
          script: |
            set -euo pipefail

            OPS_DIR="/opt/lumin-india-ops"

            # ── Ensure Docker is available ───────────────────────────
            systemctl is-active --quiet docker || systemctl start docker

            # ── Clone / pull repo ────────────────────────────────────
            if [ ! -d "$OPS_DIR/.git" ]; then
              git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/mkmk749278/lumin-india-ops.git "$OPS_DIR"
            fi

            cd "$OPS_DIR"
            git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/mkmk749278/lumin-india-ops.git
            git fetch origin main
            git reset --hard origin/main

            # ── Write env file (mode 600, never committed) ───────────
            cat > .env <<EOF
            OPS_SESSION_SECRET=${{ secrets.INDIA_OPS_SESSION_SECRET }}
            OPS_AUTH_TOKEN=${{ secrets.INDIA_OPS_AUTH_TOKEN }}
            INDIA_ENGINE_API_BASE=https://lumintrade.app
            INDIA_API_TOKEN=${{ secrets.API_STATIC_TOKEN }}
            LOG_LEVEL=INFO
            EOF
            chmod 600 .env

            # ── Build + restart ──────────────────────────────────────
            docker build -t india-ops:latest .
            docker compose down --remove-orphans || true
            docker compose --env-file .env up -d

            echo "India ops deploy complete"
